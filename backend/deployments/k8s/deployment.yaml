apiVersion: apps/v1
kind: Deployment
metadata:
  name: devpulse-api
  labels:
    app: devpulse-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devpulse-api
  template:
    metadata:
      labels:
        app: devpulse-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/api/metrics"
    spec:
      containers:
        - name: api
          image: ghcr.io/briang7/devpulse:latest
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: devpulse-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
