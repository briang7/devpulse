services:
  # Go API Backend
  - type: web
    name: devpulse-api
    runtime: docker
    dockerfilePath: ./backend/deployments/docker/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: devpulse-db
          property: connectionString
      - key: REDIS_URL
        value: ""
      - key: CORS_ORIGINS
        value: https://devpulse-frontend.onrender.com
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: "8080"
    healthCheckPath: /api/health

  # SvelteKit Frontend (Static Site)
  - type: web
    name: devpulse-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/build
    plan: free
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: devpulse-db
    plan: free
    databaseName: devpulse
