services:
  # Go API Backend
  - type: web
    name: devpulse-api
    runtime: docker
    dockerfilePath: ./backend/deployments/docker/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: devpulse-db
          property: connectionString
      - key: REDIS_URL
        value: ""
      - key: CORS_ORIGINS
        value: https://devpulse-app.web.app,https://devpulse-app.firebaseapp.com
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: "8080"
    healthCheckPath: /api/health

databases:
  - name: devpulse-db
    plan: free
    databaseName: devpulse
